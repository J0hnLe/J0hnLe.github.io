<html>
    <head>
        <title>Resume</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.12.313/pdf.worker.min.js"></script>
        <script>
// Function to load and render the PDF
function loadAndDisplayPdf(pdfUrl) {
    fetch(pdfUrl).then(response => response.arrayBuffer())
        .then(bytes => pdfjsLib.getDocument({data: bytes}).promise.then(document => {
            const pageNumber = 1; // Display first page
            document.getPage(pageNumber).then(page => {
                const scale = 1.5;
                const viewport = page.getViewport({scale});
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                page.render(renderContext).then(() => {
                    document.getElementById('pdf-viewer').appendChild(canvas);
                });
            });
        }));
}

loadAndDisplayPdf('JohnLeResume.pdf');
</script>
    </head>
    <body>
        <div id="pdf-viewer"></div>
    </body>
</html>
